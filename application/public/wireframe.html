<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>漫画サイト v1 ワイヤーフレーム</title>
    <style>
      :root { font-family: system-ui, sans-serif; color: #171717; background: #e7e7e7; }
      * { box-sizing: border-box; }
      body { margin: 0; padding: 32px 16px; }
      h1 { margin: 0 0 8px; font-size: 22px; text-align: center; }
      .note { margin: 0 0 28px; text-align: center; color: #555; font-size: 14px; }
      .screens { display: grid; grid-template-columns: repeat(4, 320px); justify-content: center; gap: 28px; }
      .screen { overflow: hidden; min-height: 660px; border: 3px solid #222; border-radius: 25px; background: #fff; box-shadow: 0 4px 14px #0002; }
      .label { padding: 12px 16px; border-bottom: 2px solid #222; background: #f4f4f4; font-weight: 700; }
      .content { padding: 18px; }
      .center { min-height: 570px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 18px; }
      .logo { font-size: 28px; font-weight: 800; }
      .sub { color: #666; font-size: 14px; }
      button, .button { display: block; width: 100%; padding: 13px; border: 2px solid #222; background: #fff; color: inherit; font: inherit; font-weight: 700; text-align: center; text-decoration: none; }
      .primary { background: #222; color: #fff; }
      .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
      .topbar h2 { margin: 0; font-size: 20px; }
      .avatar { width: 30px; height: 30px; border: 2px solid #222; border-radius: 50%; }
      .works { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px 12px; }
      .work { color: inherit; text-decoration: none; }
      .cover { aspect-ratio: 2 / 3; display: grid; place-items: center; border: 2px solid #222; background: repeating-linear-gradient(135deg, #fff, #fff 8px, #e8e8e8 8px, #e8e8e8 10px); font-weight: 700; }
      .work p { margin: 7px 0 0; font-weight: 700; font-size: 14px; }
      .work small { color: #666; }
      .back { color: inherit; text-decoration: none; font-size: 14px; }
      .hero { display: grid; grid-template-columns: 105px 1fr; gap: 14px; margin: 14px 0 22px; }
      .hero .cover { font-size: 13px; }
      .hero h2 { margin: 4px 0 6px; font-size: 20px; }
      .hero p { margin: 0; color: #666; font-size: 14px; }
      .volume { display: grid; grid-template-columns: 54px 1fr auto; align-items: center; gap: 12px; padding: 10px 0; border-top: 1px solid #aaa; color: inherit; text-decoration: none; }
      .mini-cover { height: 70px; display: grid; place-items: center; border: 2px solid #222; font-size: 12px; }
      .volume strong, .volume span { display: block; }
      .volume span { margin-top: 4px; color: #666; font-size: 13px; }
      .reader { background: #333; }
      .reader .label { color: #fff; border-color: #777; background: #222; }
      .reader-top { display: flex; justify-content: space-between; align-items: center; }
      .reader-top a { color: #fff; text-decoration: none; }
      .page { position: relative; margin: 24px auto; width: min(250px, 100%); aspect-ratio: 2 / 3; border: 2px solid #111; background: #fff; padding: 12px; }
      .panel { position: absolute; border: 2px solid #222; background: #eee; }
      .panel:nth-child(1) { inset: 12px 12px 47% 12px; }
      .panel:nth-child(2) { inset: 57% 48% 12px 12px; }
      .panel:nth-child(3) { inset: 57% 12px 12px 57%; }
      .reader-footer { padding: 10px 18px 22px; color: #fff; text-align: center; font-size: 13px; }
      @media (max-width: 1400px) { .screens { grid-template-columns: repeat(2, 320px); } }
      @media (max-width: 700px) { body { padding: 20px 12px; } .screens { grid-template-columns: 320px; } }
    </style>
  </head>
  <body>
    <h1>漫画サイト v1 — ワイヤーフレーム</h1>
    <p class="note">基本導線: ログイン → 作品一覧 → 巻一覧 → 漫画リーダー</p>

    <main class="screens">
      <section class="screen" aria-label="ログイン画面">
        <div class="label">1. ログイン</div>
        <div class="content center">
          <div class="logo">わが家の漫画</div>
          <p class="sub">家族のための漫画棚</p>
          <button class="primary" type="button">Google でログイン</button>
        </div>
      </section>

      <section class="screen" aria-label="作品一覧画面">
        <div class="label">2. 作品一覧</div>
        <div class="content">
          <div class="topbar"><h2>作品一覧</h2><div class="avatar" aria-label="プロフィール"></div></div>
          <div class="works">
            <a class="work" href="#volumes"><div class="cover">表紙</div><p>宇宙ねこ</p><small>とみぞう</small></a>
            <a class="work" href="#volumes"><div class="cover">表紙</div><p>森の探検隊</p><small>家族制作</small></a>
            <a class="work" href="#volumes"><div class="cover">表紙</div><p>おばけ日和</p><small>とみぞう</small></a>
            <a class="work" href="#volumes"><div class="cover">表紙</div><p>未来のアルバム</p><small>家族制作</small></a>
          </div>
        </div>
      </section>

      <section class="screen" id="volumes" aria-label="巻一覧画面">
        <div class="label">3. 巻一覧</div>
        <div class="content">
          <a class="back" href="#">← 作品一覧</a>
          <div class="hero"><div class="cover">作品表紙</div><div><h2>宇宙ねこ</h2><p>とみぞう</p></div></div>
          <h3>巻を選ぶ</h3>
          <a class="volume" href="#reader"><div class="mini-cover">1巻</div><div><strong>第1巻</strong><span>はじまりの星</span></div><b>›</b></a>
          <a class="volume" href="#reader"><div class="mini-cover">2巻</div><div><strong>第2巻</strong><span>月へ行こう</span></div><b>›</b></a>
          <a class="volume" href="#reader"><div class="mini-cover">3巻</div><div><strong>第3巻</strong><span>帰り道の秘密</span></div><b>›</b></a>
        </div>
      </section>

      <section class="screen reader" id="reader" aria-label="漫画リーダー画面">
        <div class="label reader-top"><a href="#volumes">← 巻一覧</a><span>宇宙ねこ 第1巻</span></div>
        <div class="page" aria-label="漫画ページのプレースホルダー"><div class="panel"></div><div class="panel"></div><div class="panel"></div></div>
        <div class="reader-footer">1 / 24<br />縦にスクロールして読む</div>
      </section>
    </main>
  </body>
</html>
